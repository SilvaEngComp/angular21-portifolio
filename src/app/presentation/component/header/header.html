<mat-toolbar color="primary" class="topbar">
  <div class="brand">
    <strong>Eliabe Nascimento Silva</strong>
    <span class="contact-info">
      <a mat-button href="https://www.linkedin.com/in/eliabe-n-silva/" target="_blank">LinkedIn</a>
      <a mat-button href="mailto:silvaengcomp@gmail.com">silvaengcomp@gmail.com</a>
      <a mat-button href="tel:+5575981004665">+55 (75) 981004665</a>
    </span>
  </div>
  <span class="spacer"></span>
  <nav class="nav-links">
    <button mat-button (click)="scrollTo('section-home')">{{'nav.home' | translate}}</button>
    <button mat-button (click)="scrollTo('section-about')">{{'nav.about' | translate}}</button>
    <button mat-button (click)="scrollTo('section-projects')">{{'nav.projects' | translate}}</button>
    <button mat-button (click)="scrollTo('section-experiences')">{{'nav.experiences' | translate}}</button>
    <button mat-button (click)="scrollTo('section-contact')">{{'nav.contact' | translate}}</button>
    <a mat-raised-button color="accent"
       href="/assets/documents/cv_EliabSilva_SoftwareEngineer.md"
       download>
      <mat-icon>download</mat-icon>
      {{'nav.download' | translate}}
    </a>
    <mat-form-field class="lang-select" appearance="outline" subscriptSizing="dynamic">
      <mat-select
        [value]="translation.currentLang()"
        (valueChange)="onLanguageChange($event)"
        aria-label="Select language"
      >
        @for (lang of languages; track lang.locale) {
          <mat-option [value]="lang.locale">
            <span class="lang-option">
              <img [src]="lang.icon" [alt]="lang.label" class="flag-icon" />
              {{ lang.label }}
            </span>
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
  </nav>
</mat-toolbar>
