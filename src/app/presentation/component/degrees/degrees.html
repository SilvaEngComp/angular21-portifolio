<div class="education-timeline">
  <h2 class="chapter-heading">{{'education.title' | translate}}</h2>

  @for (entry of entries; track entry.titleKey) {
    <div class="timeline-node">
      <div class="node-dot">
        @if (entry.logo) {
          <img [src]="entry.logo" [alt]="entry.titleKey" class="degree-logo" />
        } @else {
          <mat-icon>{{ entry.fallbackIcon }}</mat-icon>
        }
      </div>
      <div class="node-body">
        <div class="node-title">{{ entry.titleKey | translate }}</div>
        <div class="node-desc">{{ entry.line }}</div>
      </div>
    </div>
  }
</div>
