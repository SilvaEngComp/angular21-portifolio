<div class="stacks-timeline">
  <h2 class="chapter-heading">Tech Stack</h2>

  @for (cat of categories; track cat.id; let last = $last) {
    <div class="stack-node" [class.stack-node--last]="last">
      <div class="node-track">
        <div class="node-badge {{cat.iconClass}}">
          <mat-icon>{{ cat.icon }}</mat-icon>
        </div>
        @if (!last) {
          <div class="node-line"></div>
        }
      </div>
      <div class="stack-card">
        <h3 class="stack-category">{{ cat.label }}</h3>
        <div class="stack-items">
          @for (item of cat.items; track item.name) {
            <span class="stack-item">
              <img [src]="item.iconUrl" [alt]="item.name" class="item-icon" />
              <span class="item-name">{{ item.name }}</span>
              @if (item.years) {
                <span class="item-years">{{ item.years }}</span>
              }
            </span>
          }
        </div>
      </div>
    </div>
  }
</div>
