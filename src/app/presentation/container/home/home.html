<div class="page-shell">
  <app-header></app-header>

  <nav class="chapter-dots" aria-label="Page sections">
    @for (chapter of chapters; track chapter.id) {
      <button
        class="chapter-dot"
        [class.chapter-dot--active]="activeChapter() === chapter.id"
        (click)="scrollToChapter(chapter.id)"
        [title]="chapter.label | translate"
        [attr.aria-label]="chapter.label | translate"
      ></button>
    }
  </nav>

  <div class="timeline-page">
    <section class="chapter chapter--hero" id="chapter-hero">
      <div class="hero-layout">
        <div class="hero-text">
          <app-about></app-about>
        </div>
        <div class="hero-portrait">
          <app-portrait></app-portrait>
        </div>
      </div>
      <div class="scroll-hint" aria-hidden="true">
        <mat-icon>expand_more</mat-icon>
      </div>
    </section>

    <div class="timeline-track">
      <section class="chapter chapter--standard" id="chapter-experiences">
        <div class="chapter-inner" scrollReveal>
          <app-experiences></app-experiences>
        </div>
      </section>

      <section class="chapter chapter--standard" id="chapter-education">
        <div class="chapter-inner" scrollReveal>
          <app-degrees></app-degrees>
        </div>
      </section>

      <section class="chapter chapter--standard" id="chapter-projects">
        <div class="chapter-inner" scrollReveal>
          <app-projects></app-projects>
        </div>
      </section>

      <section class="chapter chapter--standard" id="chapter-skills">
        <div class="chapter-inner" scrollReveal>
          <app-stacks></app-stacks>
        </div>
      </section>

      <section class="chapter chapter--standard" id="chapter-certifications">
        <div class="chapter-inner" scrollReveal>
          <app-certifications></app-certifications>
        </div>
      </section>
    </div>

    <section class="chapter chapter--cta" id="chapter-contact">
      <div class="chapter-inner chapter-inner--cta" scrollReveal>
        <app-contact></app-contact>
      </div>
    </section>
  </div>

  @if (showScrollTop()) {
    <button mat-fab class="scroll-top-fab" (click)="scrollToTop()" aria-label="Scroll to top">
      <mat-icon>keyboard_arrow_up</mat-icon>
    </button>
  }
</div>
