name: Build and Deploy to S3

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Build Angular Project
        run: npm run build

      - name: Save build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/portifolio/
          if-no-files-found: error
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/portifolio/

      - name: Display structure of downloaded files
        run: ls -R

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          # JS bundles (hashed filenames — long-lived cache)
          aws s3 sync dist/portifolio/browser s3://eliabesilva.online/ \
            --delete \
            --exclude "*" \
            --include "*.js" \
            --cache-control "max-age=31536000,public,immutable" \
            --content-type "application/javascript"

          # CSS (hashed filenames — long-lived cache)
          aws s3 sync dist/portifolio/browser s3://eliabesilva.online/ \
            --exclude "*" \
            --include "*.css" \
            --cache-control "max-age=31536000,public,immutable" \
            --content-type "text/css"

          # Favicon — explicit MIME type so browsers render it
          aws s3 cp dist/portifolio/browser/favicon.ico s3://eliabesilva.online/favicon.ico \
            --cache-control "max-age=86400,public" \
            --content-type "image/x-icon"

          # Everything else (fonts, images, assets, etc.) — let AWS auto-detect MIME type
          aws s3 sync dist/portifolio/browser s3://eliabesilva.online/ \
            --exclude "*.js" \
            --exclude "*.css" \
            --exclude "favicon.ico" \
            --exclude "index.html" \
            --cache-control "max-age=31536000,public"

          # index.html — never cache so users always get the latest shell
          aws s3 cp dist/portifolio/browser/index.html s3://eliabesilva.online/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"



